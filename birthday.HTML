<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#89CFF0,#B6E0FE);
    color:#003366;
    text-align:center;
}

.screen{
    position:absolute;
    width:100%;
    top:25%;
}
.hidden{display:none}

input{
    padding:10px;
    width:240px;
    border-radius:6px;
    border:none;
}

button{
    padding:12px 20px;
    border:none;
    background:#0077b6;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.big{
    font-size:38px;
    text-shadow:0 0 10px #fff;
}

.line{
    font-size:20px;
    margin-top:12px;
    opacity:0;
}

.fade{
    animation:fadeIn 2s forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

img{
    width:220px;
    border-radius:15px;
    margin-top:20px;
    opacity:0;
}

.show-img{
    animation:imgIn 2s forwards;
}

@keyframes imgIn{
    to{opacity:1}
}

.balloon{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    animation:floatUp linear infinite;
    cursor:pointer;
}

@keyframes floatUp{
    0%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-60vh) translateX(30px);}
    100%{transform:translateY(-120vh) translateX(-30px);}
}
</style>
</head>

<body>

<!-- INPUT -->
<div id="s1" class="screen">
    <h2>Create a Birthday Surprise 🎂</h2>
    <input id="name" placeholder="Enter Birthday Person's Name"><br><br>
    <input type="file" id="photoInput" accept="image/*"><br>
    <small>Add a photo to make it special 💖</small><br><br>
    <button id="startBtn">Create Surprise 🎉</button>
</div>

<!-- STORY -->
<div id="s2" class="screen hidden">
    <div id="l1" class="line"></div>
    <div id="l2" class="line"></div>
    <div id="l3" class="line"></div>
</div>

<!-- PHOTO -->
<div id="s3" class="screen hidden">
    <div id="msg" class="line"></div>
    <img id="photo">
</div>

<!-- FINAL -->
<div id="s4" class="screen hidden">
    <div class="big" id="final"></div>
    <div id="extra1" class="line"></div>
    <div id="extra2" class="line"></div>
    <div id="extra3" class="line"></div>
    <div id="fromText" class="line" style="margin-top:20px;font-size:16px;">
        — Someone who wishes you the best 💙
    </div>
</div>

<audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

// ===== DOM ELEMENTS =====
const s1 = document.getElementById("s1");
const s2 = document.getElementById("s2");
const s3 = document.getElementById("s3");
const s4 = document.getElementById("s4");

const l1 = document.getElementById("l1");
const l2 = document.getElementById("l2");
const l3 = document.getElementById("l3");

const msg = document.getElementById("msg");
const photo = document.getElementById("photo");

const final = document.getElementById("final");
const extra1 = document.getElementById("extra1");
const extra2 = document.getElementById("extra2");
const extra3 = document.getElementById("extra3");
const fromText = document.getElementById("fromText");

const nameInput = document.getElementById("name");
const photoInput = document.getElementById("photoInput");
const startBtn = document.getElementById("startBtn");

const popSound = document.getElementById("popSound");

// ===== HELPERS =====
function type(el,text,speed=45){
    el.innerHTML="";
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML+=text[i++];
            setTimeout(t,speed);
        }
    }
    t();
}

function show(el){
    el.classList.add("fade");
}

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

// ===== MAIN FLOW =====
startBtn.addEventListener("click", start);

function start(){
    let name = nameInput.value.trim();
    let file = photoInput.files[0];

    if(!name) return alert("Enter name");

    s1.style.display="none";
    s2.classList.remove("hidden");

    let story = generateStory(name);

    type(l1,story[0]); show(l1);
    setTimeout(()=>{type(l2,story[1]);show(l2)},2500);
    setTimeout(()=>{type(l3,story[2]);show(l3)},5000);

    setTimeout(()=>photoScene(name,file),8000);
}

// ===== STORY =====
function generateStory(name){
    return [
        random([name+"... today feels special 🎉","Hey "+name+", something amazing today ✨",name+", this day is yours 🎂"]),
        random(["Not everyone is unique 💫","Some people are just different 💖","There’s something special about you ✨"]),
        random(["Today is your moment 💛","Enjoy every second 😊","This day is all yours 💖"])
    ];
}

// ===== PHOTO =====
function photoScene(name,file){
    s2.style.display="none";
    s3.classList.remove("hidden");

    type(msg, generateMessage(name)); show(msg);

    if(file){
        let reader=new FileReader();
        reader.onload=e=>{
            photo.src=e.target.result;
            photo.classList.add("show-img");
        }
        reader.readAsDataURL(file);
    }else{
        photo.src="https://cdn-icons-png.flaticon.com/512/616/616489.png";
        photo.classList.add("show-img");
    }

    setTimeout(()=>finalScene(name),6000);
}

// ===== MESSAGE =====
function generateMessage(name){
    return random([
        name+", you matter more than you think 💫",
        "You bring happiness to people around you 💖",
        "Stay amazing, "+name+" 😊",
        "You are truly special ✨"
    ]);
}

// ===== FINAL =====
function finalScene(name){
    s3.style.display="none";
    s4.classList.remove("hidden");

    type(final,"🎉 Happy Birthday, "+name+"! 🎂💙");

    let extra = generateFinalLines(name);

    setTimeout(()=>{extra1.innerHTML=extra[0];show(extra1)},1500);
    setTimeout(()=>{extra2.innerHTML=extra[1];show(extra2)},3000);
    setTimeout(()=>{extra3.innerHTML=extra[2];show(extra3)},4500);
    setTimeout(()=>{show(fromText)},6500);

    balloons();
}

function generateFinalLines(name){
    return [
        random(["A new year full of opportunities awaits 🎈","Good things are coming 💫","Bright moments ahead ✨"]),
        random([name+", stay amazing 💖","Keep shining always 💛","Never lose your smile 😊"]),
        random(["Enjoy your special day 🎉","Celebrate fully 🎂","Make memories 💙"])
    ];
}

// ===== BALLOONS =====
function balloons(){
    let colors=["#ff4d6d","#ffd60a","#00b4d8","#90dbf4","#cdb4db"];

    for(let i=0;i<20;i++){
        let b=document.createElement("div");
        b.className="balloon";

        b.style.left=Math.random()*100+"vw";

        let size=30+Math.random()*40;
        b.style.width=size+"px";
        b.style.height=size*1.3+"px";

        b.style.background=random(colors);
        b.style.animationDuration=(4+Math.random()*4)+"s";
        b.style.animationDelay=Math.random()*5+"s";

        b.addEventListener("click",(e)=>popBalloon(e,b));

        document.body.appendChild(b);
    }
}

// ===== POP =====
function popBalloon(e,b){
    popSound.currentTime = 0;
    popSound.play();

    createConfetti(e.clientX,e.clientY);
    b.remove();
}

// ===== CONFETTI =====
function createConfetti(x,y){
    for(let i=0;i<25;i++){
        let c=document.createElement("div");

        c.style.position="absolute";
        c.style.width="6px";
        c.style.height="6px";
        c.style.background=randomColor();
        c.style.left=x+"px";
        c.style.top=y+"px";

        let angle=Math.random()*2*Math.PI;
        let dist=Math.random()*80;

        c.style.transition="1s";

        document.body.appendChild(c);

        setTimeout(()=>{
            c.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
            c.style.opacity=0;
        },10);

        setTimeout(()=>c.remove(),1000);
    }
}

function randomColor(){
    return random(["#ff4d6d","#ffd60a","#00b4d8","#90dbf4","#cdb4db"]);
}

</script>

</body>
</html>
