<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#74c0fc,#a5d8ff,#d0ebff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* background animation */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4), transparent),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3), transparent);
    animation:moveBg 12s infinite alternate;
    z-index:-1;
}
@keyframes moveBg{
    from{transform:translate(0,0);}
    to{transform:translate(30px,30px);}
}

/* glass card */
.screen{
    position:absolute;
    width:90%;
    max-width:360px;
    padding:30px;
    border-radius:20px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    text-align:center;
}

.hidden{display:none}

/* inputs */
input{
    padding:12px;
    width:90%;
    border-radius:10px;
    border:none;
    margin-top:10px;
    background: rgba(255,255,255,0.8);
}

/* button */
button{
    padding:12px 20px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background: linear-gradient(135deg,#0077b6,#00b4d8);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
}

/* text */
.big{
    font-size:32px;
    color:#003366;
}
.line{
    font-size:18px;
    margin-top:12px;
    opacity:0;
    color:#003366;
}

.fade{
    animation:fadeIn 1.5s forwards;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(15px);}
    to{opacity:1;transform:translateY(0);}
}

/* image */
img{
    width:180px;
    border-radius:15px;
    margin-top:20px;
    opacity:0;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.show-img{
    animation:imgIn 2s forwards;
}
@keyframes imgIn{
    to{opacity:1}
}

/* balloons */
.balloon{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    animation:floatUp linear infinite;
    cursor:pointer;
}
@keyframes floatUp{
    0%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-60vh) translateX(30px);}
    100%{transform:translateY(-120vh) translateX(-30px);}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- INPUT -->
<div id="s1" class="screen">
    <h2> Surprise 🎂</h2>
    <input id="name" placeholder="Enter Name"><br>
    <input type="file" id="photoInput"><br>
    <button id="startBtn">Create</button>
</div>

<!-- STORY -->
<div id="s2" class="screen hidden">
    <div id="l1" class="line"></div>
    <div id="l2" class="line"></div>
    <div id="l3" class="line"></div>
</div>

<!-- PHOTO -->
<div id="s3" class="screen hidden">
    <div id="msg" class="line"></div>
    <img id="photo">
</div>

<!-- FINAL -->
<div id="s4" class="screen hidden">
    <div class="big" id="final"></div>
    <div id="extra1" class="line"></div>
    <div id="extra2" class="line"></div>
    <div id="extra3" class="line"></div>
    <div id="fromText" class="line" style="margin-top:20px;font-size:15px;">
        — Someone who wishes you the best 💙
    </div>
</div>

<audio id="popSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>

// elements
const s1=document.getElementById("s1");
const s2=document.getElementById("s2");
const s3=document.getElementById("s3");
const s4=document.getElementById("s4");

const l1=document.getElementById("l1");
const l2=document.getElementById("l2");
const l3=document.getElementById("l3");

const msg=document.getElementById("msg");
const photo=document.getElementById("photo");

const final=document.getElementById("final");
const extra1=document.getElementById("extra1");
const extra2=document.getElementById("extra2");
const extra3=document.getElementById("extra3");
const fromText=document.getElementById("fromText");

const nameInput=document.getElementById("name");
const photoInput=document.getElementById("photoInput");

const popSound=document.getElementById("popSound");

document.getElementById("startBtn").addEventListener("click",start);

// helpers
function type(el,text){
    el.innerHTML="";
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML+=text[i++];
            setTimeout(t,40);
        }
    }
    t();
}
function show(el){el.classList.add("fade")}
function random(arr){return arr[Math.floor(Math.random()*arr.length)]}

// story generator
function generateStory(name){
    let p1=[name+"... aaj ka din special lag raha hai 🎉","Hey "+name+", aaj kuch alag sa feel hai ✨"];
    let p2=["Har koi special nahi hota 💫","Kuch log naturally alag hote hain 💖"];
    let p3=["Aur aaj wo feeling tumhari hai 💛","Aaj ka din sirf tumhara hai 😊"];
    return [random(p1),random(p2),random(p3)];
}

// final lines
function generateFinalLines(name){
    let a=["Aaj sirf birthday nahi hai 🎈","Ye ek special moment hai 💫"];
    let b=[name+", tum important ho 💖","Tumhare jaise log rare hote hain 💛"];
    let c=["Enjoy the day 🎉","Smile always 😊"];
    return [random(a),random(b),random(c)];
}

// start
function start(){
    let name=nameInput.value.trim();
    let file=photoInput.files[0];
    if(!name) return alert("Enter name");

    s1.style.display="none";
    s2.classList.remove("hidden");

    let story=generateStory(name);

    type(l1,story[0]); show(l1);
    setTimeout(()=>{type(l2,story[1]);show(l2)},2500);
    setTimeout(()=>{type(l3,story[2]);show(l3)},5000);

    setTimeout(()=>photoScene(name,file),8000);
}

// photo
function photoScene(name,file){
    s2.style.display="none";
    s3.classList.remove("hidden");

    type(msg,random([
        name+", you matter 💫",
        "You make things better 💖",
        "Stay amazing 😊"
    ])); 
    show(msg);

    if(file){
        let r=new FileReader();
        r.onload=e=>{
            photo.src=e.target.result;
            photo.classList.add("show-img");
        }
        r.readAsDataURL(file);
    }else{
        photo.src="https://cdn-icons-png.flaticon.com/512/616/616489.png";
        photo.classList.add("show-img");
    }

    setTimeout(()=>finalScene(name),5000);
}

// final
function finalScene(name){
    s3.style.display="none";
    s4.classList.remove("hidden");

    type(final,"🎉 Happy Birthday "+name+" 🎂");

    let extra=generateFinalLines(name);

    setTimeout(()=>{extra1.innerHTML=extra[0];show(extra1)},1500);
    setTimeout(()=>{extra2.innerHTML=extra[1];show(extra2)},3000);
    setTimeout(()=>{extra3.innerHTML=extra[2];show(extra3)},4500);
    setTimeout(()=>{show(fromText)},6500);

    balloons();
}

// balloons
function balloons(){
    let colors=["#ff4d6d","#ffd60a","#00b4d8","#90dbf4","#cdb4db"];

    for(let i=0;i<20;i++){
        let b=document.createElement("div");
        b.className="balloon";

        b.style.left=Math.random()*100+"vw";

        let size=30+Math.random()*40;
        b.style.width=size+"px";
        b.style.height=size*1.3+"px";

        b.style.background=random(colors);
        b.style.animationDuration=(4+Math.random()*4)+"s";
        b.style.animationDelay=Math.random()*5+"s";

        b.onclick=(e)=>{
            popSound.currentTime=0;
            popSound.play();
            createConfetti(e.clientX,e.clientY);
            b.remove();
        };

        document.body.appendChild(b);
    }
}

// confetti
function createConfetti(x,y){
    for(let i=0;i<20;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="6px";
        c.style.height="6px";
        c.style.background=random(["red","yellow","blue"]);
        c.style.left=x+"px";
        c.style.top=y+"px";

        let angle=Math.random()*2*Math.PI;
        let dist=Math.random()*80;

        c.style.transition="1s";
        document.body.appendChild(c);

        setTimeout(()=>{
            c.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`;
            c.style.opacity=0;
        },10);

        setTimeout(()=>c.remove(),1000);
    }
}
</script>

</body>
</html>
